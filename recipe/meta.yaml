{% set name = "plottr" %}
{% set version = "0.17.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3d45b357bf726d50103f0ae8d80e7437a8b1b0ae4ac633ec80428ec4e76b60a3

build:
  number: 0
  skip: true  # [py<=311]
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - plottr-monitr = plottr.apps.monitr:script
    - plottr-inspectr = plottr.apps.inspectr:script
    - plottr-autoplot-ddh5 = plottr.apps.autoplot:script

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - xorg-libxfixes  # [linux]
    - python
    - pip
    - setuptools
    - versioningit
    - libgl-devel                    # [linux]
  run:
    - python
    - pandas >=0.22
    - xarray
    - pyqtgraph >=0.12.1
    - matplotlib >=3.0.0
    - numpy >=1.12.0
    - lmfit >=1.0
    - h5py >=2.10.0
    - qtpy >=1.9.0
    - typing_extensions >=3.7.4.3
    - packaging >=20.0
    - xhistogram >=0.3.0
    - versioningit >=1.1.0
  run_constrained:
    - pyside2 >=5.12
    - pyqt

test:
  requires:
    - pyqt
  imports:
    - plottr

about:
  home: https://github.com/toolsforexperiments/plottr
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A tool for live plotting and processing data
  description: |
    A framework for inspecting data, based on flowcharts from pyqtgraph.
    plottr's main aim is to allow the user to define custom data processing flows and plotting.
    A particular use case is data filtering and plotting.
  doc_url: https://plottr.readthedocs.io/en/latest/
  dev_url: https://github.com/toolsforexperiments/plottr

extra:
  recipe-maintainers:
    # GitHub IDs for maintainers of the recipe.
    - trevormorgan
    - astafan8
    - jenshnielsen
    - wpfff
